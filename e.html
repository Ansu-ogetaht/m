    // ----- render features -----
    function renderFeatures() {
      const grid = document.getElementById('featureGrid');
      grid.innerHTML = '';
      features.forEach(f => {
        const item = document.createElement('div');
        item.className = 'feature-item';
        item.dataset.id = f.id;
        item.innerHTML = `<i class="fas ${f.icon}"></i><h4>${f.title}</h4><p>${f.desc}</p>`;
        item.addEventListener('click', () => {
          openModal(f);
          burstEmojis('❤️', 15);
        });
        grid.appendChild(item);
      });
    }

    // ----- MODAL -----
    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');

    function openModal(feature) {
      modalTitle.innerText = `✨ ${feature.title}`;
      modalBody.innerHTML = feature.content;
      modalOverlay.classList.add('active');
      
      // attach song play events
      document.querySelectorAll('.song-item .play-song').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const parent = this.closest('.song-item');
          const song = parent.dataset.song;
          const artist = parent.dataset.artist;
          const audio = new Audio(`songs/${song.toLowerCase().replace(/ /g,'')}.mp3`);
          audio.play().catch(() => {
            alert(`🎵 Now playing: "${song}" by ${artist} ❤️ (imagine the melody)`);
          });
          burstEmojis('🎵', 10);
          this.innerText = '▶ playing';
          this.style.background = '#ff7caa';
          setTimeout(() => { this.innerText = '▶ play'; this.style.background = ''; }, 1500);
        });
      });

      // gallery click to fullscreen
      document.querySelectorAll('.gallery-img').forEach(img => {
        img.addEventListener('click', function() {
          const fullscreen = document.getElementById('fullscreenImg');
          const fullImg = document.getElementById('fullscreenImgSrc');
          fullImg.src = this.src;
          fullscreen.classList.add('active');
          burstEmojis('📸', 10);
        });
      });

      // update days counter if this is the days feature
      if (feature.id === 'days') {
        updateDaysCounter();
        if (window.daysInterval) clearInterval(window.daysInterval);
        window.daysInterval = setInterval(updateDaysCounter, 60000);
      } else {
        if (window.daysInterval) clearInterval(window.daysInterval);
      }

      affectionValue += 5;
      affectionSpan.innerText = affectionValue.toLocaleString();
    }

    function updateDaysCounter() {
      const start = new Date('2023-02-01');
      const now = new Date();
      const diff = now - start;
      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      const years = Math.floor(days / 365);
      
      const daysNum = document.getElementById('daysNum');
      const hoursNum = document.getElementById('hoursNum');
      const minutesNum = document.getElementById('minutesNum');
      const yearsNum = document.getElementById('yearsNum');
      
      if (daysNum) daysNum.innerText = days % 365;
      if (hoursNum) hoursNum.innerText = hours % 24;
      if (minutesNum) minutesNum.innerText = minutes % 60;
      if (yearsNum) yearsNum.innerText = years;
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      if (window.daysInterval) clearInterval(window.daysInterval);
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

    // FULLSCREEN IMAGE CLOSE
    const fullscreenImg = document.getElementById('fullscreenImg');
    fullscreenImg.addEventListener('click', function() {
      this.classList.remove('active');
    });

    // ----- LOGIN -----
    function login() {
      const name = usernameInput.value.trim() || 'babe';
      if (name.length > 0) {
        loginScreen.style.display = 'none';
        dashboard.style.display = 'block';
        document.querySelector('.profile-name').innerHTML = `${name} <small>✨ 4ever</small>`;
        affectionValue += 11;
        affectionSpan.innerText = affectionValue.toLocaleString();
        document.getElementById('rotatingQuote').innerText = 'you are my universe';
        dashboard.style.animation = 'none';
        setTimeout(() => dashboard.style.animation = 'fadeGlow 0.8s ease', 10);
        burstEmojis('💖', 30);
      } else {
        usernameInput.placeholder = 'type anything, love ❤️';
        usernameInput.style.borderColor = '#ff3b7f';
      }
    }

    function logout() {
      dashboard.style.display = 'none';
      loginScreen.style.display = 'flex';
      closeModal();
      if (window.daysInterval) clearInterval(window.daysInterval);
    }

    loginBtn.addEventListener('click', login);
    logoutBtn.addEventListener('click', logout);
    usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });

    // affection click
    document.getElementById('affectionDisplay').addEventListener('click', function() {
      affectionValue += 50;
      affectionSpan.innerText = affectionValue.toLocaleString();
      burstEmojis('💗', 25);

    });

    const quotes = ['you are my universe', 'every day i fall more', 'sexy & brilliant', 'my heart is yours', 'you make me weak', 'eternal flame', 'your smile is magic', 'i adore you', 'my only one', 'love you infinity', 'you are art', 'breathtaking'];
    let qi = 0;
    setInterval(() => {
      if (dashboard.style.display !== 'none') {
        qi = (qi + 1) % quotes.length;
        document.getElementById('rotatingQuote').innerText = quotes[qi];
      }
    }, 7000);

    // auto affection
    setInterval(() => {
      if (dashboard.style.display !== 'none') {
        affectionValue += 2;
        affectionSpan.innerText = affectionValue.toLocaleString();
      }
    }, 4000);

    renderFeatures();
    usernameInput.value = 'my love';
    passwordInput.value = 'love';
  })();
